name: debug android
on:
  push:
    branches:
      - '**'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write

jobs:
  build_apk_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 24
        uses: actions/setup-java@v3
        with:
          java-version: '24'
          distribution: 'temurin'
      - name: Download Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > composeApp/coshanu-android-release.jks
      - name: Verify Keystore
        run: ls -la composeApp/coshanu-android-release.jks
      - name: verify keystore
        run: echo "The keystore is ${{ secrets.ANDROID_KEYSTORE }}"
      - name: verify Secrets
        run: echo "The secrets are ${{ secrets.ANDROID_KEYSTORE_PASSWORD }} ${{ secrets.ANDROID_KEY_ALIAS }} ${{ secrets.ANDROID_KEY_PASSWORD }}"
      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          arguments: >-
            :composeApp:packageReleaseApk
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }}
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
